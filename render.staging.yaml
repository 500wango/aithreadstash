# Render staging deployment configuration for AI ThreadStash

services:
  # Backend API service (staging)
  - type: web
    name: aithreadstash-api-staging
    env: node
    plan: starter
    buildCommand: cd backend && npm ci && npm run build
    startCommand: cd backend && npm run start:render
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3007
      - key: DATABASE_URL
        fromDatabase:
          name: aithreadstash-db-staging
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://staging.aithreadstash.com
      - key: API_URL
        value: https://aithreadstash-api-staging.onrender.com
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_CALLBACK_URL
        value: https://aithreadstash-api-staging.onrender.com/auth/github/callback
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        value: https://aithreadstash-api-staging.onrender.com/auth/google/callback
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: NOTION_CLIENT_ID
        sync: false
      - key: NOTION_CLIENT_SECRET
        sync: false
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
      - key: ALLOW_VERCEL_PREVIEW
        value: "1"

databases:
  # PostgreSQL database (staging)
  - name: aithreadstash-db-staging
    plan: starter
    databaseName: aithreadstash_staging
    user: aithreadstash_user_staging